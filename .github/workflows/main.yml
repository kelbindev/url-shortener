name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: main
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add VM to known_hosts
        run: |
          ssh-keyscan -H ${{ secrets.AZURE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Azure VM over SSH
        run: |
          ssh -i ~/.ssh/id_rsa -l "${{ secrets.AZURE_USER }}" "${{ secrets.AZURE_HOST }}" "
            git config --global url.'https://${{ secrets.GH_PAT }}:x-oauth-basic@github.com/'.insteadOf 'https://github.com/'
            cd ~/url-shortener &&
            git fetch --all &&
            git reset --hard origin/main &&
            docker build -t url-shortener:latest . &&
            docker rm -f url-shortener || true &&
            docker run -d -p 8081:8080 \
              --name url-shortener \
              --restart unless-stopped \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e ASPNETCORE_URLS=http://+:8080 \
              -e AZURE_KEYVAULT_URL='${{ secrets.AZURE_KEYVAULT_URL }}' \
              -e AZURE_SECRET_NAME_CONNECTIONSTRING='${{ secrets.AZURE_SECRET_NAME_CONNECTIONSTRING }}' \
              -e AZURE_CLIENT_ID='${{ secrets.AZURE_CLIENT_ID }}' \
              -e AZURE_CLIENT_SECRET='${{ secrets.AZURE_CLIENT_SECRET }}' \
              -e AZURE_TENANT_ID='${{ secrets.AZURE_TENANT_ID }}' \
              -e Jwt__Key='${{ secrets.JWT_SECRET }}' \
              -e Jwt__Issuer='${{ secrets.JWT_ISSUER }}' \
              -e Jwt__Audience='${{ secrets.JWT_AUDIENCE }}' \
              url-shortener:latest
          "
